# Traefik IngressRoute for Grafana — prod cluster
# Apply manually or add to manifests/monitoring/ and let ArgoCD manage it
# Replace grafana.yourdomain.com with your actual domain

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod   # must match your ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - grafana.yourdomain.com

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.yourdomain.com`)
      kind: Rule
      services:
        - name: monitoring-kube-prometheus-stack-grafana
          port: 80
  tls:
    secretName: grafana-tls

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http-redirect
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.yourdomain.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: monitoring
      services:
        - name: monitoring-kube-prometheus-stack-grafana
          port: 80

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: monitoring
spec:
  redirectScheme:
    scheme: https
    permanent: true