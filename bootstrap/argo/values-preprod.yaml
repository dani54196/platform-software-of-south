# ArgoCD Helm values — preprod cluster
# Access: http://<NODE_IP>:30080
# No TLS, no ingress — internal/VPN access only

configs:
  params:
    # Disable TLS on argocd-server (not needed without ingress)
    server.insecure: true

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

  ingress:
    enabled: false

  # Tuned for small VMs (4CPU / 8GB RAM)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

notifications:
  enabled: false

dex:
  enabled: false  # No SSO for preprod