# Traefik IngressRoute for ArgoCD — prod cluster
# Requires: cert-manager ClusterIssuer named "letsencrypt-prod"
# Replace argocd.softwareofsouth.website with your actual domain

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  issuerRef:
    name: letsencrypt-prod   # must match your ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - argocd.softwareofsouth.website  # replace with your domain

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.softwareofsouth.website`)  # replace with your domain
      kind: Rule
      services:
        - name: argocd-server
          port: 80  # argocd-server runs insecure (HTTP) internally
  tls:
    secretName: argocd-tls

---
# Redirect HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-http-redirect
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`argocd.softwareofsouth.website`)  # replace with your domain
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: argocd
      services:
        - name: argocd-server
          port: 80

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: argocd
spec:
  redirectScheme:
    scheme: https
    permanent: true